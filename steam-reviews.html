<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 评论获取工具</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1b2838;
            color: #c7d5e0;
        }
        h1 {
            color: #66c0f4;
            text-align: center;
        }
        .input-section {
            background: #171a21;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #8f98a0;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #2a475e;
            border-radius: 4px;
            background: #0e141d;
            color: #c7d5e0;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #66c0f4;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #66c0f4;
            color: #0e141d;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #4ba3d1;
        }
        button:disabled {
            background: #4a5568;
            cursor: not-allowed;
        }
        .progress {
            text-align: center;
            margin: 20px 0;
            color: #66c0f4;
        }
        .stats {
            background: #171a21;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
        }
        .stat-value {
            font-size: 24px;
            color: #66c0f4;
            font-weight: bold;
        }
        .stat-label {
            color: #8f98a0;
            font-size: 12px;
        }
        .review-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .review-card {
            background: #171a21;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #66c0f4;
        }
        .review-card.negative {
            border-left-color: #e74c3c;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .review-author {
            color: #66c0f4;
            font-weight: bold;
        }
        .review-date {
            color: #8f98a0;
            font-size: 12px;
        }
        .review-type {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .review-type.positive {
            background: #4caf50;
            color: white;
        }
        .review-type.negative {
            background: #e74c3c;
            color: white;
        }
        .review-text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .review-meta {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a475e;
            font-size: 12px;
            color: #8f98a0;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .review-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .developer-response {
            margin-top: 15px;
            padding: 15px;
            background: #0e141d;
            border-radius: 4px;
            border-left: 3px solid #f39c12;
        }
        .developer-response-title {
            color: #f39c12;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8f98a0;
        }
        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .language-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .language-option {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #0e141d;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #2a475e;
            transition: all 0.2s;
        }
        .language-option:hover {
            border-color: #66c0f4;
        }
        .language-option.selected {
            background: #66c0f4;
            border-color: #66c0f4;
        }
        .language-option.selected label {
            color: #0e141d;
        }
        .language-option input {
            display: none;
        }
        .api-section {
            background: #171a21;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .api-section .form-group {
            margin-bottom: 10px;
        }
        .two-columns {
            display: flex;
            gap: 20px;
        }
        .two-columns .form-group {
            flex: 1;
        }
        #analyzeBtn {
            background: #f39c12;
            margin-top: 10px;
        }
        #analyzeBtn:hover {
            background: #e67e22;
        }
        .ai-analysis {
            background: #171a21;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .ai-analysis h2 {
            color: #66c0f4;
            margin-top: 0;
        }
        .ai-analysis-content {
            line-height: 1.8;
        }
        .ai-analysis-content h3 {
            color: #f39c12;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .ai-analysis-content ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        .ai-analysis-content li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Steam 评论获取工具</h1>
    
    <div class="input-section">
        <div class="form-group">
            <label for="appid">Steam App ID:</label>
            <input type="text" id="appid" placeholder="例如: 730 (CS:GO), 570 (Dota 2), 440 (TF2)">
        </div>
        <div class="form-group">
            <label for="startTime">起始时间:</label>
            <input type="datetime-local" id="startTime">
        </div>
        <div class="form-group">
            <label for="endTime">结束时间:</label>
            <input type="datetime-local" id="endTime">
        </div>
        <div class="form-group">
            <label>语言筛选:</label>
            <div class="language-options" id="languageOptions">
                <label class="language-option" data-value="schinese">
                    <input type="checkbox" value="schinese" checked>
                    简体中文
                </label>
                <label class="language-option" data-value="tchinese">
                    <input type="checkbox" value="tchinese">
                    繁体中文
                </label>
                <label class="language-option" data-value="japanese">
                    <input type="checkbox" value="japanese">
                    日文
                </label>
                <label class="language-option" data-value="koreana">
                    <input type="checkbox" value="koreana">
                    韩文
                </label>
                <label class="language-option" data-value="english">
                    <input type="checkbox" value="english">
                    英文
                </label>
                <label class="language-option" data-value="all">
                    <input type="checkbox" value="all">
                    全部语言
                </label>
            </div>
        </div>
        <button id="fetchBtn" onclick="fetchReviews()">获取评论</button>
    </div>

    <div class="api-section">
        <div class="form-group">
            <label for="apiKey">Gemini API Key:</label>
            <input type="password" id="apiKey" placeholder="输入您的 Gemini API Key">
        </div>
        <div class="two-columns">
            <div class="form-group">
                <label for="reviewCount">用于分析的评论数量:</label>
                <input type="number" id="reviewCount" value="50" min="1" max="100">
            </div>
        </div>
        <button id="analyzeBtn" onclick="analyzeReviews()">AI 分析评论</button>
    </div>

    <div id="error" class="error" style="display: none;"></div>
    <div id="progress" class="progress" style="display: none;"></div>

    <div id="stats" class="stats" style="display: none;">
        <div class="stat-item">
            <div class="stat-value" id="totalReviews">0</div>
            <div class="stat-label">总评论数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="positiveReviews">0</div>
            <div class="stat-label">好评数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="negativeReviews">0</div>
            <div class="stat-label">差评数</div>
        </div>
    </div>

    <div id="aiAnalysis" class="ai-analysis" style="display: none;">
        <h2>AI 分析结果</h2>
        <div id="aiAnalysisContent" class="ai-analysis-content"></div>
    </div>

    <div id="reviewList" class="review-list"></div>

    <script>
        let allReviews = [];

        document.getElementById('languageOptions').addEventListener('change', function(e) {
            if (e.target.type === 'checkbox') {
                const label = e.target.closest('.language-option');
                if (e.target.checked) {
                    label.classList.add('selected');
                    if (e.target.value === 'all') {
                        document.querySelectorAll('.language-option input').forEach(cb => {
                            if (cb.value !== 'all') {
                                cb.checked = false;
                                cb.closest('.language-option').classList.remove('selected');
                            }
                        });
                    } else {
                        document.querySelector('.language-option input[value="all"]').checked = false;
                        document.querySelector('.language-option input[value="all"]').closest('.language-option').classList.remove('selected');
                        document.querySelectorAll('.language-option input').forEach(cb => {
                            if (cb.value !== 'all' && cb.value !== e.target.value) {
                                cb.checked = false;
                                cb.closest('.language-option').classList.remove('selected');
                            }
                        });
                    }
                } else {
                    label.classList.remove('selected');
                }
            }
        });

        function getSelectedLanguages() {
            const checked = document.querySelectorAll('.language-option input:checked');
            const values = Array.from(checked).map(cb => cb.value);
            if (values.length === 0) return 'schinese';
            if (values.includes('all')) return 'all';
            return values.join(',');
        }
        
        async function fetchReviews() {
            const appid = document.getElementById('appid').value.trim();
            const startTimeInput = document.getElementById('startTime').value;
            const endTimeInput = document.getElementById('endTime').value;
            const languages = getSelectedLanguages();
            
            if (!appid) {
                showError('请输入 App ID');
                return;
            }

            if (!startTimeInput) {
                showError('请选择起始时间');
                return;
            }

            const startTimestamp = new Date(startTimeInput).getTime() / 1000;
            const endTimestamp = endTimeInput ? new Date(endTimeInput).getTime() / 1000 : Math.floor(Date.now() / 1000);
            
            clearError();
            showProgress('正在获取评论（将获取一年内的所有评论）...');
            document.getElementById('fetchBtn').disabled = true;
            allReviews = [];

            try {
                let cursor = '*';
                let hasMore = true;
                let pageCount = 0;
                const languageList = languages.split(',');

                if (languages === 'all') {
                    let allCursor = '*';
                    let allHasMore = true;
                    
                    while (allHasMore) {
                        pageCount++;
                        document.getElementById('progress').textContent = `正在获取第 ${pageCount} 页评论 (全部语言)...`;
                        
                        const url = `https://store.steampowered.com/appreviews/${appid}?json=1&filter=recent&language=all&num_per_page=100&cursor=${encodeURIComponent(allCursor)}`;
                        
                        const response = await fetch(url);
                        const data = await response.json();

                        if (data.success !== 1) {
                            throw new Error(data.message || 'API 请求失败');
                        }

                        if (data.reviews && data.reviews.length > 0) {
                            allReviews.push(...data.reviews);
                            
                            if (data.reviews.length < 100) {
                                allHasMore = false;
                            } else {
                                allCursor = data.cursor;
                            }
                        } else {
                            allHasMore = false;
                        }

                        await new Promise(resolve => setTimeout(resolve, 1000));
                    }
                } else {
                    for (const language of languageList) {
                        let langCursor = '*';
                        let langHasMore = true;
                        
                        while (langHasMore) {
                            pageCount++;
                            const langName = { 'schinese': '简体中文', 'tchinese': '繁体中文', 'japanese': '日文', 'koreana': '韩文', 'english': '英文' }[language] || language;
                            document.getElementById('progress').textContent = `正在获取第 ${pageCount} 页评论 (${langName})...`;
                            
                            const url = `https://store.steampowered.com/appreviews/${appid}?json=1&filter=recent&language=${language}&num_per_page=100&cursor=${encodeURIComponent(langCursor)}`;
                            
                            const response = await fetch(url);
                            const data = await response.json();

                            if (data.success !== 1) {
                                throw new Error(data.message || 'API 请求失败');
                            }

                            if (data.reviews && data.reviews.length > 0) {
                                allReviews.push(...data.reviews);
                                
                                if (data.reviews.length < 100) {
                                    langHasMore = false;
                                } else {
                                    langCursor = data.cursor;
                                }
                            } else {
                                langHasMore = false;
                            }

                            await new Promise(resolve => setTimeout(resolve, 1000));
                        }
                    }
                }

                const uniqueReviews = [];
                const seen = new Set();
                allReviews.forEach(review => {
                    if (!seen.has(review.recommendationid)) {
                        seen.add(review.recommendationid);
                        uniqueReviews.push(review);
                    }
                });
                allReviews = uniqueReviews;

                const filteredByTime = allReviews.filter(review => {
                    return review.timestamp_created >= startTimestamp && review.timestamp_created <= endTimestamp;
                });
                allReviews = filteredByTime;

                displayReviews();
                hideProgress();
            } catch (error) {
                showError('获取评论失败: ' + error.message);
                hideProgress();
            } finally {
                document.getElementById('fetchBtn').disabled = false;
            }
        }

        function displayReviews() {
            const reviewList = document.getElementById('reviewList');
            const stats = document.getElementById('stats');
            
            if (allReviews.length === 0) {
                reviewList.innerHTML = '<div class="loading">没有找到符合条件的评论</div>';
                stats.style.display = 'none';
                return;
            }

            const positiveCount = allReviews.filter(r => r.voted_up).length;
            const negativeCount = allReviews.length - positiveCount;

            document.getElementById('totalReviews').textContent = allReviews.length;
            document.getElementById('positiveReviews').textContent = positiveCount;
            document.getElementById('negativeReviews').textContent = negativeCount;
            stats.style.display = 'flex';

            const sortedReviews = [...allReviews].sort((a, b) => b.timestamp_created - a.timestamp_created);

            reviewList.innerHTML = sortedReviews.map(review => {
                const date = new Date(review.timestamp_created * 1000);
                const playtimeHours = (review.playtime_forever / 60).toFixed(1);
                
                let developerResponseHtml = '';
                if (review.developer_response) {
                    developerResponseHtml = `
                        <div class="developer-response">
                            <div class="developer-response-title">开发者回复</div>
                            <div>${escapeHtml(review.developer_response)}</div>
                        </div>
                    `;
                }

                return `
                    <div class="review-card ${review.voted_up ? '' : 'negative'}">
                        <div class="review-header">
                            <div>
                                <span class="review-author">${review.author.steamid ? 'Steam 用户' : '匿名用户'}</span>
                                <span class="review-type ${review.voted_up ? 'positive' : 'negative'}">${review.voted_up ? '好评' : '差评'}</span>
                            </div>
                            <span class="review-date">${formatDate(date)}</span>
                        </div>
                        <div class="review-text">${escapeHtml(review.review)}</div>
                        <div class="review-meta">
                            <span>游戏时长: ${playtimeHours} 小时</span>
                            <span>拥有游戏: ${review.author.num_games_owned} 款</span>
                            <span>评测数: ${review.author.num_reviews} 篇</span>
                            <span>点赞: ${review.votes_up}</span>
                            ${review.steam_purchase ? '<span>在Steam购买</span>' : ''}
                            ${review.written_during_early_access ? '<span>抢先体验</span>' : ''}
                        </div>
                        ${developerResponseHtml}
                    </div>
                `;
            }).join('');
        }

        function formatDate(date) {
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function clearError() {
            document.getElementById('error').style.display = 'none';
        }

        function showProgress(message) {
            const progressDiv = document.getElementById('progress');
            progressDiv.textContent = message;
            progressDiv.style.display = 'block';
        }

        function hideProgress() {
            document.getElementById('progress').style.display = 'none';
        }

        async function analyzeReviews() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const reviewCount = parseInt(document.getElementById('reviewCount').value) || 50;

            if (!apiKey) {
                showError('请输入 Gemini API Key');
                return;
            }

            if (allReviews.length === 0) {
                showError('请先获取评论');
                return;
            }

            const sortedReviews = [...allReviews].sort((a, b) => b.timestamp_created - a.timestamp_created);
            const reviewsToAnalyze = sortedReviews.slice(0, reviewCount);

            const reviewsText = reviewsToAnalyze.map((review, index) => {
                const type = review.voted_up ? '好评' : '差评';
                const date = new Date(review.timestamp_created * 1000).toLocaleString('zh-CN');
                return `${index + 1}. [${type}] ${date}: ${review.review}`;
            }).join('\n\n');

            const prompt = `你是一位专业游戏分析师。分析以下 Steam 评论：\n1. 核心情绪 \n2. 主要优点 \n3. 主要痛点 \n4. 改进建议。\n以中文回答，请输出 HTML 格式（不要代码块标签）：\n\n${reviewsText}`;

            clearError();
            showProgress('正在调用 AI 分析评论...');
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('aiAnalysis').style.display = 'none';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'API 请求失败');
                }

                const analysisText = data.candidates?.[0]?.content?.parts?.[0]?.text || '无法获取分析结果';

                document.getElementById('aiAnalysisContent').innerHTML = analysisText;
                document.getElementById('aiAnalysis').style.display = 'block';
                hideProgress();
            } catch (error) {
                showError('AI 分析失败: ' + error.message);
                hideProgress();
            } finally {
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        const now = new Date();
        now.setMonth(now.getMonth() - 1);
        const defaultStartTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        document.getElementById('startTime').value = defaultStartTime.toISOString().slice(0, 16);
        
        const defaultEndTime = new Date(Date.now() - new Date().getTimezoneOffset() * 60000);
        document.getElementById('endTime').value = defaultEndTime.toISOString().slice(0, 16);

        document.querySelectorAll('.language-option input:checked').forEach(cb => {
            cb.closest('.language-option').classList.add('selected');
        });
    </script>
</body>
</html>
